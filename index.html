<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Qlik AI Certification Prep</title>
<style>
:root {
  --green: #009845;
  --navy: #1e3a5f;
  --navy-light: #2d5282;
  --bg: #f4f6f9;
  --card: #ffffff;
  --text: #1a1a2e;
  --text-muted: #6b7280;
  --border: #e2e8f0;
  --green-light: #e8f5ed;
  --correct: #16a34a;
  --wrong: #dc2626;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── Header ── */
#header {
  background: var(--navy);
  color: #fff;
  display: flex;
  align-items: center;
  padding: 0 24px;
  height: 56px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,.3);
}
#header h1 {
  font-size: 1.1rem;
  font-weight: 700;
  flex: 1;
  letter-spacing: .3px;
}
#header h1 span { color: var(--green); }

/* ── Search Bar ── */
#search-wrap {
  position: relative;
  margin: 0 16px;
}
#search-input {
  background: rgba(255,255,255,.12);
  border: 1px solid rgba(255,255,255,.25);
  border-radius: 22px;
  color: #fff;
  font-size: .85rem;
  padding: 7px 36px 7px 14px;
  width: 220px;
  outline: none;
  transition: all .2s;
}
#search-input::placeholder { color: rgba(255,255,255,.5); }
#search-input:focus {
  background: rgba(255,255,255,.2);
  border-color: var(--green);
  width: 280px;
}
#search-icon {
  position: absolute;
  right: 11px;
  top: 50%;
  transform: translateY(-50%);
  color: rgba(255,255,255,.5);
  font-size: .9rem;
  pointer-events: none;
}

/* ── Search Results View ── */
#search-view {
  flex: 1;
  overflow-y: auto;
  padding: 32px;
  display: none;
}
.search-results-page { max-width: 820px; margin: 0 auto; }
.search-results-page h2 { color: var(--navy); font-size: 1.3rem; margin-bottom: 6px; }
.search-meta { color: var(--text-muted); font-size: .87rem; margin-bottom: 24px; }
.search-result-card {
  background: var(--card);
  border-radius: 10px;
  padding: 18px 22px;
  margin-bottom: 14px;
  box-shadow: 0 2px 8px rgba(0,0,0,.05);
  cursor: pointer;
  border: 2px solid transparent;
  transition: all .18s;
}
.search-result-card:hover { border-color: var(--green); transform: translateY(-1px); }
.search-result-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}
.search-result-module {
  font-size: .72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .6px;
  padding: 2px 10px;
  border-radius: 99px;
  color: #fff;
}
.search-result-lesson { font-weight: 700; color: var(--navy); font-size: .97rem; }
.search-result-excerpt {
  font-size: .86rem;
  color: var(--text-muted);
  line-height: 1.65;
}
.search-result-excerpt mark {
  background: #fff176;
  color: var(--text);
  border-radius: 2px;
  padding: 0 2px;
  font-weight: 600;
}
.search-no-results {
  text-align: center;
  padding: 60px 0;
  color: var(--text-muted);
}
.search-no-results .no-icon { font-size: 2.5rem; margin-bottom: 12px; }

#nav-tabs { display: flex; gap: 4px; }
.tab-btn {
  background: transparent;
  border: none;
  color: rgba(255,255,255,.7);
  cursor: pointer;
  padding: 8px 18px;
  border-radius: 6px;
  font-size: .9rem;
  font-weight: 500;
  transition: all .2s;
}
.tab-btn:hover { background: rgba(255,255,255,.1); color: #fff; }
.tab-btn.active { background: var(--green); color: #fff; }

/* ── Layout ── */
#app { display: flex; height: calc(100vh - 56px); }

/* ── Sidebar ── */
#sidebar {
  width: 280px;
  background: var(--card);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  flex-shrink: 0;
}
.module-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 16px;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
  transition: background .15s;
  user-select: none;
}
.module-header:hover { background: var(--bg); }
.module-dot {
  width: 10px; height: 10px; border-radius: 50%;
  flex-shrink: 0;
}
.module-title { font-weight: 600; font-size: .82rem; flex: 1; line-height: 1.3; }
.module-chevron { font-size: .7rem; color: var(--text-muted); transition: transform .2s; }
.module-header.open .module-chevron { transform: rotate(90deg); }
.lesson-list { display: none; }
.module-header.open + .lesson-list { display: block; }
.lesson-item {
  padding: 10px 16px 10px 36px;
  font-size: .82rem;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
  color: var(--text-muted);
  transition: all .15s;
  position: relative;
}
.lesson-item::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: transparent;
}
.lesson-item:hover { background: var(--bg); color: var(--text); }
.lesson-item.active {
  background: var(--green-light);
  color: var(--green);
  font-weight: 600;
}
.lesson-item.active::before { background: var(--green); }
.lesson-item.done { color: var(--text); }
.lesson-item.done::after {
  content: '✓';
  float: right;
  color: var(--correct);
  font-size: .75rem;
}

/* ── Content ── */
#content {
  flex: 1;
  overflow-y: auto;
  padding: 32px;
}
.lesson-page { max-width: 820px; margin: 0 auto; }
.lesson-page h2 {
  font-size: 1.5rem;
  color: var(--navy);
  margin-bottom: 6px;
}
.lesson-page .module-label {
  font-size: .8rem;
  color: var(--green);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .8px;
  margin-bottom: 20px;
}
.lesson-page h3 {
  font-size: 1.1rem;
  color: var(--navy);
  margin: 24px 0 10px;
  padding-bottom: 6px;
  border-bottom: 2px solid var(--green);
  display: inline-block;
}
.lesson-page p { margin-bottom: 14px; line-height: 1.7; }
.lesson-page ul, .lesson-page ol {
  margin: 0 0 14px 20px;
  line-height: 1.7;
}
.lesson-page li { margin-bottom: 6px; }
.info-box {
  background: var(--green-light);
  border-left: 4px solid var(--green);
  padding: 14px 18px;
  border-radius: 0 8px 8px 0;
  margin: 16px 0;
}
.info-box strong { color: var(--green); }
.warning-box {
  background: #fff8e1;
  border-left: 4px solid #f59e0b;
  padding: 14px 18px;
  border-radius: 0 8px 8px 0;
  margin: 16px 0;
}
.definition {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 16px;
  margin: 10px 0;
}
.definition dt { font-weight: 700; color: var(--navy); margin-bottom: 4px; }
.definition dd { margin-left: 0; color: var(--text-muted); font-size: .93rem; line-height: 1.6; }
.comparison-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin: 16px 0;
}
.comparison-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px;
}
.comparison-card h4 { color: var(--navy); margin-bottom: 8px; font-size: .9rem; }
.comparison-card ul { margin-left: 16px; font-size: .87rem; }
.lesson-nav {
  display: flex;
  justify-content: space-between;
  margin-top: 32px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
}
.lesson-nav button {
  padding: 10px 22px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
  font-weight: 600;
  font-size: .88rem;
  transition: all .2s;
}
.btn-prev {
  background: transparent;
  color: var(--navy);
  border: 1px solid var(--border) !important;
}
.btn-prev:hover { background: var(--bg); }
.btn-next {
  background: var(--green);
  color: #fff;
}
.btn-next:hover { background: #007a38; }
.btn-complete {
  background: var(--navy);
  color: #fff;
}
.btn-complete:hover { background: var(--navy-light); }

/* ── Quiz ── */
#quiz-view {
  flex: 1;
  overflow-y: auto;
  padding: 32px;
  display: none;
}
.quiz-header {
  max-width: 820px;
  margin: 0 auto 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.quiz-header h2 { color: var(--navy); font-size: 1.3rem; }
.quiz-stats {
  display: flex;
  gap: 20px;
  font-size: .85rem;
  color: var(--text-muted);
}
.quiz-stats span strong { color: var(--text); }
.progress-bar {
  max-width: 820px;
  margin: 0 auto 28px;
  background: var(--border);
  border-radius: 99px;
  height: 6px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--green);
  border-radius: 99px;
  transition: width .3s;
}
.question-card {
  max-width: 820px;
  margin: 0 auto;
  background: var(--card);
  border-radius: 12px;
  padding: 28px;
  box-shadow: 0 2px 12px rgba(0,0,0,.06);
}
.question-meta {
  display: flex;
  justify-content: space-between;
  margin-bottom: 16px;
}
.question-num { font-size: .8rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; }
.module-tag {
  font-size: .75rem;
  background: var(--green-light);
  color: var(--green);
  padding: 2px 10px;
  border-radius: 99px;
  font-weight: 600;
}
.question-text {
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--navy);
  line-height: 1.5;
  margin-bottom: 22px;
}
.options { display: flex; flex-direction: column; gap: 10px; }
.option-btn {
  background: var(--bg);
  border: 2px solid var(--border);
  border-radius: 8px;
  padding: 13px 16px;
  text-align: left;
  cursor: pointer;
  font-size: .92rem;
  line-height: 1.45;
  transition: all .15s;
  display: flex;
  align-items: flex-start;
  gap: 12px;
}
.option-btn:hover:not(:disabled) {
  border-color: var(--green);
  background: var(--green-light);
}
.option-letter {
  font-weight: 700;
  color: var(--text-muted);
  min-width: 20px;
  font-size: .85rem;
}
.option-btn.selected { border-color: var(--navy); background: #eef2f9; }
.option-btn.correct { border-color: var(--correct) !important; background: #f0fdf4 !important; }
.option-btn.wrong { border-color: var(--wrong) !important; background: #fef2f2 !important; }
.option-btn.correct .option-letter { color: var(--correct); }
.option-btn.wrong .option-letter { color: var(--wrong); }
.option-btn:disabled { cursor: default; }
.explanation-box {
  margin-top: 18px;
  padding: 14px;
  background: #f0fdf4;
  border-radius: 8px;
  border-left: 3px solid var(--correct);
  font-size: .88rem;
  line-height: 1.6;
  display: none;
}
.explanation-box.wrong-exp { background: #fef2f2; border-color: var(--wrong); }
.quiz-controls {
  max-width: 820px;
  margin: 20px auto 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
}
.quiz-btn {
  padding: 10px 24px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: 600;
  font-size: .9rem;
  transition: all .2s;
}
#btn-submit { background: var(--navy); color: #fff; }
#btn-submit:hover { background: var(--navy-light); }
#btn-submit:disabled { opacity: .4; cursor: default; }
#btn-next-q { background: var(--green); color: #fff; display: none; }
#btn-next-q:hover { background: #007a38; }
#btn-prev-q { background: transparent; color: var(--navy); border: 1px solid var(--border); }
#btn-prev-q:hover { background: var(--bg); }
.quiz-filter {
  display: flex;
  gap: 8px;
  max-width: 820px;
  margin: 0 auto 20px;
  flex-wrap: wrap;
}
.filter-btn {
  padding: 6px 14px;
  border-radius: 99px;
  border: 1px solid var(--border);
  background: var(--card);
  cursor: pointer;
  font-size: .8rem;
  font-weight: 500;
  transition: all .15s;
}
.filter-btn:hover, .filter-btn.active {
  background: var(--navy);
  color: #fff;
  border-color: var(--navy);
}

/* ── Quiz Results ── */
#results-view {
  max-width: 820px;
  margin: 0 auto;
  display: none;
}
.results-hero {
  background: var(--navy);
  color: #fff;
  border-radius: 12px;
  padding: 32px;
  text-align: center;
  margin-bottom: 24px;
}
.results-hero .big-score {
  font-size: 4rem;
  font-weight: 800;
  line-height: 1;
  margin-bottom: 8px;
}
.results-hero .score-label { font-size: 1rem; opacity: .8; margin-bottom: 4px; }
.results-hero .verdict {
  font-size: 1.3rem;
  font-weight: 700;
  margin-top: 12px;
  color: var(--green);
}
.module-results {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}
.module-result-card {
  background: var(--card);
  border-radius: 10px;
  padding: 18px;
  box-shadow: 0 2px 8px rgba(0,0,0,.05);
}
.module-result-card h4 { font-size: .85rem; color: var(--text-muted); margin-bottom: 8px; }
.module-result-card .mod-score { font-size: 1.5rem; font-weight: 800; color: var(--navy); }
.module-result-card .mod-bar {
  height: 6px;
  background: var(--border);
  border-radius: 99px;
  margin-top: 8px;
  overflow: hidden;
}
.module-result-card .mod-fill {
  height: 100%;
  border-radius: 99px;
  background: var(--green);
  transition: width .6s ease;
}
.results-actions { display: flex; gap: 12px; justify-content: center; margin-top: 8px; }
.results-actions button {
  padding: 11px 26px;
  border-radius: 7px;
  border: none;
  cursor: pointer;
  font-weight: 600;
  font-size: .9rem;
}
.btn-restart { background: var(--green); color: #fff; }
.btn-restart:hover { background: #007a38; }
.btn-review { background: transparent; color: var(--navy); border: 1px solid var(--border) !important; }
.btn-review:hover { background: var(--bg); }

/* ── Progress View ── */
#progress-view {
  flex: 1;
  overflow-y: auto;
  padding: 32px;
  display: none;
}
.progress-page { max-width: 820px; margin: 0 auto; }
.progress-page h2 { color: var(--navy); font-size: 1.4rem; margin-bottom: 24px; }
.progress-modules { display: grid; gap: 16px; }
.progress-module-card {
  background: var(--card);
  border-radius: 10px;
  padding: 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,.05);
}
.progress-module-card h3 { font-size: 1rem; color: var(--navy); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.prog-bar-wrap { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
.prog-label { font-size: .8rem; color: var(--text-muted); width: 80px; }
.prog-bar {
  flex: 1;
  height: 8px;
  background: var(--border);
  border-radius: 99px;
  overflow: hidden;
}
.prog-fill {
  height: 100%;
  background: var(--green);
  border-radius: 99px;
  transition: width .4s;
}
.prog-pct { font-size: .8rem; font-weight: 700; color: var(--navy); min-width: 36px; text-align: right; }
.best-score-tag {
  display: inline-block;
  font-size: .75rem;
  padding: 2px 8px;
  border-radius: 99px;
  font-weight: 600;
}
.score-pass { background: var(--green-light); color: var(--green); }
.score-fail { background: #fef2f2; color: var(--wrong); }
.reset-btn {
  margin-top: 20px;
  padding: 9px 20px;
  background: transparent;
  border: 1px solid var(--wrong);
  color: var(--wrong);
  border-radius: 6px;
  cursor: pointer;
  font-size: .85rem;
  font-weight: 600;
  transition: all .2s;
}
.reset-btn:hover { background: #fef2f2; }

/* ── Welcome screen ── */
.welcome {
  max-width: 820px;
  margin: 0 auto;
  padding: 20px 0;
}
.welcome h2 { color: var(--navy); font-size: 1.5rem; margin-bottom: 10px; }
.welcome p { color: var(--text-muted); line-height: 1.6; margin-bottom: 24px; }
.module-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 16px; }
.module-card {
  background: var(--card);
  border-radius: 10px;
  padding: 18px;
  cursor: pointer;
  box-shadow: 0 2px 8px rgba(0,0,0,.05);
  border: 2px solid transparent;
  transition: all .2s;
}
.module-card:hover { border-color: var(--green); transform: translateY(-2px); }
.module-card-dot {
  width: 12px; height: 12px; border-radius: 50%; margin-bottom: 12px;
}
.module-card h3 { font-size: .9rem; color: var(--navy); margin-bottom: 6px; line-height: 1.3; }
.module-card p { font-size: .78rem; color: var(--text-muted); }
.module-card .lesson-count { font-size: .75rem; color: var(--green); font-weight: 600; margin-top: 8px; }

@media (max-width: 768px) {
  #sidebar { display: none; }
  .comparison-grid { grid-template-columns: 1fr; }
  #content, #quiz-view, #progress-view { padding: 20px 16px; }
}

/* ── Podcast Player ── */
#podcast-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--navy);
  color: #fff;
  padding: 12px 24px;
  display: none;
  align-items: center;
  gap: 16px;
  z-index: 200;
  box-shadow: 0 -4px 16px rgba(0,0,0,.25);
  border-top: 2px solid var(--green);
}
#podcast-bar.visible { display: flex; }
.pod-info { flex: 0 0 auto; max-width: 240px; }
.pod-title { font-weight: 700; font-size: .85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pod-sub { font-size: .72rem; color: rgba(255,255,255,.55); margin-top: 1px; }
.pod-controls { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.pod-btn {
  background: rgba(255,255,255,.1);
  border: none; border-radius: 50%;
  width: 36px; height: 36px;
  color: #fff; cursor: pointer; font-size: 1rem;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s;
}
.pod-btn:hover { background: var(--green); }
.pod-btn.play-main { width: 42px; height: 42px; font-size: 1.2rem; background: var(--green); }
.pod-btn.play-main:hover { background: #007a38; }
.pod-progress-wrap { flex: 1; display: flex; align-items: center; gap: 10px; }
.pod-time { font-size: .75rem; color: rgba(255,255,255,.65); flex-shrink: 0; white-space: nowrap; }
.pod-seek {
  flex: 1; height: 4px; border-radius: 99px;
  background: rgba(255,255,255,.2);
  cursor: pointer; position: relative; appearance: none;
  accent-color: var(--green);
}
.pod-speed {
  background: rgba(255,255,255,.1);
  border: 1px solid rgba(255,255,255,.2);
  border-radius: 6px; color: #fff;
  font-size: .75rem; padding: 4px 8px;
  cursor: pointer; flex-shrink: 0;
}
.pod-speed:hover { background: rgba(255,255,255,.2); }
.pod-close {
  background: none; border: none; color: rgba(255,255,255,.45);
  font-size: 1.1rem; cursor: pointer; padding: 4px; flex-shrink: 0;
  transition: color .15s;
}
.pod-close:hover { color: #fff; }
.pod-tracks { display: flex; align-items: center; gap: 5px; margin-top: 4px; }
.pod-track-btn {
  background: none; border: none; color: rgba(255,255,255,.5);
  font-size: 1rem; cursor: pointer; padding: 0 3px; line-height: 1;
  transition: color .15s;
}
.pod-track-btn:hover { color: #fff; }
#podcast-btn {
  background: rgba(255,255,255,.1);
  border: 1px solid rgba(255,255,255,.2);
  border-radius: 20px;
  color: #fff;
  cursor: pointer;
  padding: 6px 14px;
  font-size: .82rem;
  font-weight: 600;
  display: flex; align-items: center; gap: 6px;
  transition: all .2s;
  white-space: nowrap;
  margin-right: 4px;
}
#podcast-btn:hover { background: var(--green); border-color: var(--green); }
/* push app content up when player is open */
body.pod-open #app { padding-bottom: 72px; }
</style>
</head>
<body>

<div id="header">
  <h1>Qlik <span>AI</span> Certification Prep</h1>
  <div id="search-wrap">
    <input type="text" id="search-input" placeholder="Search lessons…" oninput="handleSearch(this.value)" autocomplete="off" />
    <span id="search-icon">⌕</span>
  </div>
  <button id="podcast-btn" onclick="togglePodcast()">🎧 Podcast</button>

'1.4': `<h2>Limitations &amp; Concerns Around AI</h2>
<div class="module-label">Module 1 · Introduction to AI for Business</div>
<h3>Key AI Limitations</h3>
<dl class="definition"><dt>Hallucinations</dt><dd>Incorrect or inaccurate AI outputs presented as fact. Causes: limitations in training data, biased data, misunderstanding the task, incorrect data pattern assumptions.</dd></dl>
<dl class="definition"><dt>Calculation Errors</dt><dd>AI struggles because it is a predictive model, not a logic model. It predicts next sequences based on patterns, not actual mathematical computation.</dd></dl>
<dl class="definition"><dt>Comprehension Issues</dt><dd>AI lacks common sense. It predicts outcomes based on recognizing patterns, not true understanding. Context must be explicit.</dd></dl>
<h3>Real-World Example: Paris Temperature</h3>
<p>When asked about "Paris" weather, an AI companion predicted Paris, France instead of Paris, Texas — because the AI used data patterns to predict the most likely location. Providing more explicit context (Paris, Texas, USA) resolves the ambiguity.</p>
<h3>Example: Calculation Error</h3>
<p>When asked about Apple's gross profit margin, an AI might compute $95B - $25B = $63B (instead of $70B). LLMs predict based on patterns, not perform actual arithmetic — they are predictive models, not logic models.</p>
<h3>Techniques to Identify &amp; Limit AI Concerns</h3>
<ul>
<li><strong>Critically evaluate AI outputs:</strong> Challenge the output, look for validation and disproving instances</li>
<li><strong>Seek additional sources:</strong> Do not rely solely on AI — consult other verifiable and reputable resources</li>
<li><strong>Seek diverse resources:</strong> Look at answers from mixed and variable sources across different focus areas</li>
</ul>
<div class="warning-box"><strong>Important:</strong> AI is a predictive model, not a logic model. This is why it struggles with calculations — it predicts the next sequence rather than computing actual results.</div>`,

'2.4': `<h2>Large Language Models Deep Dive</h2>
<div class="module-label">Module 2 · Understanding GenAI</div>
<h3>Types of LLMs</h3>
<dl class="definition"><dt>General-purpose LLMs</dt><dd>Handle many tasks, understand many languages. Trained on massive internet data. Examples: GPT-3 (175B parameters), GPT-4.</dd></dl>
<dl class="definition"><dt>Task-specific LLMs</dt><dd>Specialize in targeted tasks. Example: Code Llama for software code generation.</dd></dl>

<dl class="definition"><dt>Multimodal LLMs</dt><dd>Handle images and other media along with text (vs. traditional LLMs that focus only on text).</dd></dl>
<h3>Key LLM Models</h3>
<ul>
<li><strong>OpenAI GPT family:</strong> GPT-1 through GPT-4. GPT-2 (1.5B params) for narrow tasks; GPT-3 (175B params) for complex tasks.</li>
<li><strong>BERT (Google):</strong> Bidirectional transformer encoder. Uses masked language modeling. Best for NLU tasks (classification, QA, NER).</li>
<li><strong>Llama (Meta):</strong> Excels at translation, text generation, QA.</li>
<li><strong>XLNet (Carnegie Mellon + Google):</strong> Generates high-quality multilingual text.</li>
</ul>
<h3>Key Terminology</h3>
<dl class="definition"><dt>Prompt</dt><dd>The text input provided to a language model that guides its output generation.</dd></dl>
<dl class="definition"><dt>Completion</dt><dd>The result produced by the model based on the prompt. The process = inference.</dd></dl>
<dl class="definition"><dt>Vector Embeddings</dt><dd>Words mapped to token IDs and transformed into mathematical vectors in multi-dimensional space. Enable semantic similarity search rather than exact matches.</dd></dl>
<dl class="definition"><dt>Vector Database</dt><dd>Stores data as mathematical representations. Enables fast retrieval based on similarity metrics. Critical for RAG, recommendations, and search.</dd></dl>

'2.5': `<h2>LLM Application Project Lifecycle</h2>
<div class="module-label">Module 2 · Understanding GenAI</div>
<h3>Step 1: Define the Use Case</h3>
<p>Identify the business problem: personalized product descriptions, document summarization, code generation, customer support chatbot, etc.</p>
<h3>Selecting the Right LLM</h3>
<div class="comparison-grid">
<div class="comparison-card"><h4>Hosted LLMs</h4><ul><li>ChatGPT, Gemini — accessible via UI or APIs</li><li>No infrastructure overhead</li><li>Less control over data</li></ul></div>
<div class="comparison-card"><h4>Open-source LLMs</h4><ul><li>Llama — free to download and modify</li><li>Deploy in your own environment</li><li>More control but more infrastructure responsibility</li></ul></div>
</div>
<h3>Model Customization Techniques</h3>
<dl class="definition"><dt>Prompt Engineering</dt><dd>Crafting inputs to shape LLM output. Techniques: <strong>Zero-shot</strong> (no examples), <strong>One-shot</strong> (one example), <strong>Few-shot</strong> (multiple examples). Goal: guide the model toward desired output without retraining.</dd></dl>
<dl class="definition"><dt>In-Context Learning (ICL)</dt><dd>Providing additional context during inference (without retraining). The model dynamically updates its understanding. Used with private/proprietary documents to improve domain-specific responses.</dd></dl>
<dl class="definition"><dt>Retrieval-Augmented Generation (RAG)</dt><dd>Combines retrieval and generation. Retrieves relevant information from a vector database, passes to LLM with a prompt, LLM generates an answer from input data. Addresses: limited knowledge of obscure subjects, stale data, lack of proprietary insight.</dd></dl>
<dl class="definition"><dt>Fine-tuning</dt><dd>Updates parameters of a pretrained model on domain-specific data. 4 steps: (1) Select pretrained LLM, (2) Identify quality datasets, (3) Train with prompts and expected answers, (4) Evaluate and adjust hyperparameters.</dd></dl>
<dl class="definition"><dt>RLHF (Reinforcement Learning from Human Feedback)</dt><dd>Ongoing fine-tuning with human evaluator feedback. Human raters score responses → model updates parameters. Reduces harmful content, improves conversational quality.</dd></dl>
<h3>Using a Vector Database</h3>
<p>Each word is mapped to a token ID and transformed into a vector. Vector databases enable efficient storage, retrieval, and manipulation. Key feature: identifies related text based on similarity metrics (semantic distance), not exact matches. Critical for RAG applications.</p>`,

'2.6': `<h2>Bringing LLMs to Production</h2>
<div class="module-label">Module 2 · Understanding GenAI</div>
<h3>LLM Data Pipelines</h3>
<p>Beyond traditional data pipelines (clean, curate, govern), LLM pipelines require:</p>
<dl class="definition"><dt>Semantic Caching</dt><dd>Precomputes and stores semantic representations (embeddings) of possible queries. When a user interacts, retrieves precomputed representation instead of processing from scratch. Reduces computational overhead, speeds up response generation. Ideal for chatbots and recommendation systems requiring real-time responses.</dd></dl>
<dl class="definition"><dt>Feature Injection</dt><dd>Incorporating additional information into the AI model at inference time. Improves the model's ability to handle specific tasks and capture important data patterns.</dd></dl>
<dl class="definition"><dt>Context Retrieval</dt><dd>Retrieving relevant contextual information (previous interactions, user history). RAG is a type of in-context learning (ICL) for context retrieval.</dd></dl>
<h3>Processing for Inference</h3>
<p>Three primary considerations for running LLMs in production:</p>
<ul>
<li><strong>Infrastructure:</strong> GPUs ideal for parallel computations. Size depends on model size, memory requirements, and latency constraints.</li>
<li><strong>Access:</strong> Hosted on private servers or cloud platforms. Cloud = scalability + easy deployment but raises security/governance concerns.</li>
<li><strong>Consumption:</strong> Access via APIs or application-specific interfaces.</li>
</ul>
<h3>Reducing Latency</h3>
<p>Latency = the time it takes the LLM to make predictions after receiving input. Strategies: use smaller models, optimize for inference, use efficient hardware, keep processing close to the data.</p>
<h3>LLMOps &amp; Orchestration</h3>
<dl class="definition"><dt>LLMOps</dt><dd>LLM Operations — emerging set of tools, techniques, and frameworks for building AI-powered applications.</dd></dl>
<dl class="definition"><dt>Orchestration Frameworks</dt><dd>Coordinate AI agents and other components to accomplish specific goals. Example: LangChain. Capabilities: chain prompts, connect to data sources, scale to multiple LLMs.</dd></dl>
<dl class="definition"><dt>AI Agents</dt><dd>Individual instances of language models performing specific tasks (summarization, translation, sentiment analysis) within an orchestration system.</dd></dl>
<h3>RAG in Production</h3>
<p>Text sources often exceed the context window (typically a few thousand tokens). External data sources are divided into <strong>chunks</strong> (split), each fitting in the context window. LangChain handles this chunking automatically. RAG connects LLMs to external data, addressing the limitation of stale training data.</p>`,

These are the three principles AI enthusiasts commonly cite when discussing responsible AI deployment.
</div>
<h3>AI Bias</h3>
<p>LLMs reflect and reinforce societal biases present in training data. If historical data contains biases (race, gender), the LLM may perpetuate them. Three ethical principles:</p>
<ul>
<li><strong>Bias mitigation:</strong> Actively work to minimize biased results, ensure inclusive and representative models</li>
<li><strong>Responsible use:</strong> Establish guidelines and guardrails to prevent misuse, misinformation, hate speech</li>
<li><strong>Societal impact:</strong> Understand broader consequences for various stakeholders</li>
</ul>
<h3>Open-Source Risks</h3>
<p>LLMs like Llama 2, BERT, and Falcon offer capabilities at little cost but carry risks: training data often not publicly accessible, tools may be vulnerable if not regularly updated and patched.</p>
<h3>Copyright Concerns</h3>
<p>In September 2023, 17 authors (including George R.R. Martin, John Grisham) filed a class action suit against OpenAI alleging "flagrant and harmful" copyright infringement through using copyrighted works to train AI. Enterprises must be aware of the legal implications of content used in GenAI projects.</p>
<h3>Hallucinations — Mitigation Strategies</h3>
<ul>
<li>Fine-tuning with reliable and accurate data</li>
<li>Incorporating human review and oversight</li>
<li>Continuously monitoring and refining GenAI systems</li>
</ul>`,

'3.2': `<h2>RAG Architecture &amp; Knowledge Bases</h2>
<div class="module-label">Module 3 · Qlik Answers</div>
<h3>Understanding RAG</h3>
<p><strong>RAG = Retrieval-Augmented Generation</strong> — a framework combining retrieval techniques with generative models used in NLP to enhance LLM performance by incorporating external knowledge.</p>
<ul>
<li><strong>R (Retrieval):</strong> Semantic search against a knowledge base (vector store) to find relevant chunks</li>
<li><strong>A (Augmented):</strong> Retrieved context is added to the prompt provided to the LLM</li>
<li><strong>G (Generation):</strong> LLM generates a natural language answer using the retrieved context</li>
</ul>
<h3>How Qlik Answers Uses RAG</h3>
<p>When a user asks a question:</p>
<ol>
<li>The assistant performs a <strong>semantic search</strong> against the knowledge base</li>
<li>The system finds the <strong>top 10 most relevant text chunks</strong></li>
<li>RAG passes those chunks to the LLM</li>
<li>The LLM generates an answer with <strong>references back to relevant documents</strong></li>
</ol>
<h3>Knowledge Base Architecture</h3>
<p>A knowledge base stores documents in <strong>text chunk format</strong>. The relevant text chunks are called when users ask questions.</p>
<ul>
<li>Documents are split into chunks that fit the context window</li>
<li>Chunks are converted to vector embeddings</li>
<li>OpenSearch stores the embeddings for semantic retrieval</li>
<li>Cohere Rerank (on Amazon SageMaker) ranks the most relevant embeddings</li>
</ul>
<h3>Hallucination Mitigation in Qlik Answers</h3>
<ul>
<li>Detects contextual relevance in provided content</li>
<li>Users can view source content to verify responses</li>
<li>Fine-tuning with reliable and accurate data</li>
</ul>
<h3>Limitations of Qlik Answers (Use Case Limitations)</h3>
<div class="warning-box">
<strong>Not supported:</strong>
<ul>
<li><strong>Summarization:</strong> The system searches top 10 relevant chunks only — cannot consider the entire knowledge base for a summary</li>
<li><strong>Calculations:</strong> Similar limitation — only relevant chunks are retrieved, not all numerical data</li>
</ul>
<strong>Key insight:</strong> Qlik Answers is designed as a "needle in a haystack" tool, not for aggregate analysis.
</div>`,

'4.1': `<h2>Machine Learning Concepts &amp; AutoML</h2>
<div class="module-label">Module 4 · Understanding Qlik Predict</div>
<h3>What is Machine Learning?</h3>
<p>Machine learning (ML) is:</p>
<blockquote style="border-left:4px solid var(--green);padding:10px 16px;margin:14px 0;color:var(--text-muted);font-style:italic;">"The use and development of computer systems that are able to learn and adapt without following explicit instructions, by using algorithms and statistical models to analyze and draw inferences from patterns in data."</blockquote>
<p>ML is a branch of AI and data science focused on <strong>recognizing patterns in historical data to predict future outcomes</strong>. Used across all industries: sales forecasting, churn reduction, customer acquisition, inventory optimization, spend analysis.</p>
<h3>Four Categories of ML Problems</h3>
<dl class="definition"><dt>Supervised Learning</dt><dd>Trained on labeled data (input + known output). Goal: predict output for new inputs. Types: <strong>Classification</strong> (predicting categories, e.g., spam detection) and <strong>Regression</strong> (predicting continuous values, e.g., house prices).</dd></dl>
<dl class="definition"><dt>Unsupervised Learning</dt><dd>No labeled outputs. Identifies patterns and structures. Types: <strong>Clustering</strong> (grouping similar points, e.g., customer segmentation) and <strong>Dimensionality Reduction</strong> (e.g., PCA).</dd></dl>
<dl class="definition"><dt>Semi-supervised Learning</dt><dd>Mix of labeled and unlabeled data (labeled portion often small). Useful when labeling is expensive.</dd></dl>
<dl class="definition"><dt>Reinforcement Learning</dt><dd>Agent learns by interacting with environment, receiving rewards or penalties. Examples: robot walking, game-playing AI (AlphaGo).</dd></dl>
<h3>AutoML — Automated Machine Learning</h3>
<p>AutoML automates the time-consuming, iterative steps performed by data scientists:</p>
<ul>
<li>Data preprocessing and feature engineering</li>
<li>Feature selection</li>
<li>Model selection</li>
<li>Hyperparameter tuning</li>
<li>Model evaluation</li>
</ul>
<h3>Qlik AutoML — Predict, Explain, Act</h3>
<ul>
<li><strong>Predict:</strong> Generate accurate forecasts, transition from historical to forward-looking insights, address the "other 90%" of use cases</li>
<li><strong>Explain:</strong> Full model explainability with links to underlying data, transparent AI decisions</li>
<li><strong>Act:</strong> Fully integrated into Qlik Cloud, what-if analysis, alerting, automation, MLOps for retraining</li>
</ul>
<div class="info-box"><strong>Popular AutoML tools:</strong> Google AutoML, H2O.ai, Auto-sklearn, Microsoft Azure AutoML, Qlik AutoML</div>`,

'4.3': `<h2>Formulating the ML Question</h2>
<div class="module-label">Module 4 · Understanding Qlik Predict</div>
<h3>The Structured ML Framework</h3>
<p>Turning a business use case into a specific, ML-ready problem requires a structured framework:</p>
<dl class="definition"><dt>Event Trigger</dt><dd>An action or event that triggers creation of new predictions. Each event trigger corresponds to a single row of data. Example: "A customer has signed up for a subscription."</dd></dl>
<dl class="definition"><dt>Target</dt><dd>The value you are trying to predict. Must be specific in both <em>outcome</em> (what) and <em>time frame/horizon</em> (by when). Represented as a single column in the training dataset.</dd></dl>
<dl class="definition"><dt>Features</dt><dd>Other columns in the dataset used to predict the target. Hypotheses about which variables will influence the target. Must be aggregated to the event trigger level or higher.</dd></dl>
<dl class="definition"><dt>Prediction Point</dt><dd>The designated time when you stop collecting feature data and predict the target. Balance: accuracy (predict late enough to have good data) vs. actionability (predict early enough to act).</dd></dl>
<h3>Time Windows</h3>
<ul>
<li><strong>Data accumulation window:</strong> Time between event trigger and prediction point (collecting feature data)</li>
<li><strong>Action window:</strong> Time between prediction point and target horizon (time to act on predictions)</li>
</ul>
<h3>Example: Customer Churn</h3>
<p><strong>Business case:</strong> "Will a customer churn?"</p>
<ul>
<li><strong>Event trigger:</strong> A new customer subscribes (new customer created in system)</li>
<li><strong>Target:</strong> Will the customer churn within X months? (binary Yes/No)</li>
<li><strong>Features:</strong> Login frequency, support ticket count, plan type, payment history</li>
<li><strong>Prediction point:</strong> X weeks after subscription start</li>
</ul>
<h3>Example: Customer Repurchase</h3>
<p>Correct ML question: <em>"Predicting one week after a customer places an order, will they order again within six months?"</em></p>
<ul>
<li>Event trigger: A customer places an order</li>
<li>Target: Another order placed within six months (binary Yes/No)</li>
<li>Prediction point: One week after order</li>
</ul>
<div class="info-box"><strong>Template:</strong> "Predicting [prediction point] after [event trigger], will [target] happen within [horizon]?"</div>`,

'4.4': `<h2>Preparing the AutoML Dataset</h2>
<div class="module-label">Module 4 · Understanding Qlik Predict</div>
<h3>Getting Your Dataset ML-Ready</h3>
<ol>
<li><strong>Collect relevant data points:</strong> Define your ML question precisely, decide what to aggregate</li>
<li><strong>Understand your data:</strong> Address sample size, feature selection (simpler is typically better)</li>
<li><strong>Transform and remove data:</strong> Use business knowledge, transform data types, remove irrelevant features</li>
</ol>
<h3>Key Data Concepts</h3>
<dl class="definition"><dt>Feature Engineering</dt><dd>Creating new feature columns from existing ones to gain additional predictive power. Example: converting home addresses to distances from a specific location; creating trip interval buckets from trip distance.</dd></dl>
<dl class="definition"><dt>Cardinality</dt><dd>Uniqueness of data values in a column. <strong>High cardinality</strong> (many unique values, e.g., an ID field) has little variance — cannot identify patterns. <strong>Low cardinality</strong> (one unique value, constant) also useless. Solution: bin/group similar values.</dd></dl>
<dl class="definition"><dt>Correlation</dt><dd>How features relate to each other. Totally correlated features are likely redundant — remove one. Example: coffee consumed and hours awake are correlated.</dd></dl>
<dl class="definition"><dt>Data Leakage</dt><dd>Training data includes information you are trying to predict → model performs better in training than in real world (false accuracy). AutoML's intelligent optimization detects and removes target leakage.</dd></dl>
<dl class="definition"><dt>Class Balancing</dt><dd>In binary classification, uneven data between two classes leads the model to learn more about the majority class. Class balancing improves performance on the minority class.</dd></dl>
<h3>Intelligent Model Optimization</h3>
<p>Qlik AutoML automatically:</p>
<ul>
<li>Removes features negatively affecting performance (highly correlated features)</li>
<li>Detects and removes target leakage</li>
<li>Removes features with low importance</li>
<li>Removes outliers via outlier value weighting</li>
<li>Applies class balancing for imbalanced binary targets</li>
<li>Uses sampling to speed up training (starting small, scaling to 100%)</li>
</ul>
<h3>Qlik Cloud Tools for Dataset Preparation</h3>
<ul>
<li><strong>Qlik Talend Data Integration:</strong> Production pipelines, basic transformations</li>
<li><strong>Qlik Cloud Scripting:</strong> Power of the Qlik Engine for data preparation using Qlik script language</li>
<li><strong>Qlik Cloud Data Flow:</strong> No-code visual dataset development</li>
</ul>`,

<div class="comparison-card"><h4>AutoML Is</h4><ul><li>Automated ML pipeline (preprocessing, feature selection, model selection, hyperparameter tuning)</li><li>For business analysts AND data scientists</li><li>Code-free ML model building</li><li>Focuses on supervised learning (classification + regression)</li></ul></div>
<div class="comparison-card"><h4>AutoML Is Not</h4><ul><li>Deep learning framework from scratch</li><li>Replacement for all data science work</li><li>Unsupervised clustering tool</li><li>A general-purpose AI assistant</li></ul></div>
</div>`,

'5.2': `<h2>Machine Learning Foundations &amp; EDA</h2>
<div class="module-label">Module 5 · Qlik Predict Foundations</div>
<h3>Exploratory Data Analysis (EDA)</h3>
<p>EDA helps you make early discoveries in your data that can refine hypotheses, data quality, and performance of initial AutoML models.</p>
<p>EDA topics in Qlik AutoML:</p>
<ul>
<li>Inspecting potential data sources</li>
<li>Determining whether your data is viable</li>
<li>Creating descriptive analysis for ML</li>
<li>Informing dataset design from summarized insights</li>
</ul>
<h3>Feature Engineering Revisited</h3>
<p>Feature engineering creates new features from existing ones. In the taxi fare example:</p>
<ul>
<li>Rename <code>trip_distance</code> → <code>trip_distance_km</code></li>
<li>Create interval feature: <code>Replace(class(trip_distance, 5), '&lt;= x &lt;', 'to') as trip_interval_5km</code></li>
<li>Create rate feature: <code>Round(fare_amount/trip_distance, 0.01) as fare_amount_per_km</code></li>
<li>Create category: <code>If(fare_amount/trip_distance&gt;10, 'high', If(fare_amount/trip_distance&gt;5, 'mid', 'low')) as PriceGroup</code></li>
</ul>
<div class="warning-box"><strong>Data leakage:</strong> An ID field with unique values per row would be dropped automatically due to high cardinality.</div>
<h3>Supervised Learning in AutoML</h3>
<p>AutoML focuses on supervised learning with two problem types:</p>
<div class="comparison-grid">
<div class="comparison-card"><h4>Classification</h4><ul><li><strong>Binary:</strong> Two outcomes (Yes/No, Spam/Not Spam)</li><li><strong>Multi-class:</strong> Multiple categories (handwritten digits 0-9)</li><li>Output: a category label</li></ul></div>
<div class="comparison-card"><h4>Regression</h4><ul><li>Predicts a continuous numerical value</li><li>Examples: taxi fare, house prices, stock prices</li><li>Output: a number ("how much" or "how many")</li></ul></div>
</div>`,

'5.3': `<h2>Model Scoring &amp; Prediction Influencers</h2>
<div class="module-label">Module 5 · Qlik Predict Foundations</div>
<h3>Model Scoring Basics</h3>
<p>Model scoring measures how well your model generalizes to unseen data:</p>
<ul>
<li><strong>Classification Model Scoring:</strong> Accuracy, precision, recall, F1-score, AUC-ROC</li>
<li><strong>Multiclass Model Scoring:</strong> Per-class metrics, confusion matrix</li>
<li><strong>Regression Model Scoring:</strong> RMSE, MAE, R-squared</li>
<li><strong>Time Series Model Scoring:</strong> Specific temporal accuracy metrics</li>
</ul>
<h3>Prediction Influencers (SHAP / Shapley Values)</h3>
<p>Prediction influencers explain <strong>why a specific prediction was made</strong> by quantifying each feature's contribution to that prediction.</p>
<dl class="definition"><dt>Shapley Values (SHAP)</dt><dd>From game theory — measures each feature's marginal contribution to the prediction. Provides a clear, feature-level explanation for every individual prediction, not just overall model importance.</dd></dl>
<h3>How Prediction Influencers Work in Qlik AutoML</h3>
<p>After model training, Qlik AutoML generates SHAP data for each prediction:</p>
<ul>
<li>Shows which features pushed the prediction higher or lower</li>
<li>Enables "Explain-ability" — understanding the "why" behind predictions</li>
<li>Gray Associates example: prediction influencers exported to Qlik Sense dashboards as colored heat maps showing opportunity/drawback</li>
</ul>
<h3>Applying Prediction Influencers</h3>
<p>Business stakeholders can:</p>
<ul>
<li>Understand why a customer is predicted to churn</li>
<li>Identify which features are driving revenue predictions</li>
<li>Take targeted action based on the specific influencing factors</li>
<li>Build trust in AI-driven decisions across the organization</li>
</ul>
<div class="info-box"><strong>Key insight:</strong> SHAP values are not just model-level feature importance — they explain each individual prediction, enabling personalized, actionable insights.</div>`,

/* ====================================================
   STATE
==================================================== */
let currentView = 'study';
let currentLesson = null;
let allLessons = [];
let quizState = {
  currentQ: 0,
  answers: {},
  answered: {},
  mode: 'all', // 'all' or module id
  filteredQ: [],
  submitted: false,
  showResults: false
};

// Build flat lesson list
MODULES.forEach(m => m.lessons.forEach(l => allLessons.push({ ...l, moduleId: m.id })));

/* ====================================================
   LOCAL STORAGE
==================================================== */
function loadProgress() {
  try { return JSON.parse(localStorage.getItem('qlik_cert_progress') || '{}'); } catch { return {}; }
}
function saveProgress(p) {
  localStorage.setItem('qlik_cert_progress', JSON.stringify(p));
}
function markLessonDone(lessonId) {
  const p = loadProgress();
  p.lessons = p.lessons || {};
  p.lessons[lessonId] = true;
  saveProgress(p);
}
function saveBestScore(score, total, perModule) {
  const p = loadProgress();
  p.quizScores = p.quizScores || [];
  p.quizScores.push({ score, total, perModule, date: new Date().toISOString() });
  if (!p.bestScore || score / total > p.bestScore.score / p.bestScore.total) {
    p.bestScore = { score, total, perModule };
  }
  saveProgress(p);
}

/* ====================================================
   VIEWS
==================================================== */
function showView(view) {
  currentView = view;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  const tabIdx = ['study','quiz','progress'].indexOf(view);
  if (tabIdx >= 0) document.querySelectorAll('.tab-btn')[tabIdx].classList.add('active');
  document.getElementById('sidebar').style.display = view === 'study' ? 'block' : 'none';
  document.getElementById('content').style.display = view === 'study' ? 'block' : 'none';
  document.getElementById('quiz-view').style.display = view === 'quiz' ? 'block' : 'none';
  document.getElementById('progress-view').style.display = view === 'progress' ? 'block' : 'none';
  document.getElementById('search-view').style.display = view === 'search' ? 'block' : 'none';
  if (view === 'quiz') renderQuiz();
  if (view === 'progress') renderProgress();
}

/* ====================================================
   STUDY VIEW
==================================================== */
function buildSidebar() {
  const p = loadProgress();
  const done = p.lessons || {};
  let html = '';
  MODULES.forEach((m, mi) => {
    html += `<div class="module-header ${mi === 0 ? 'open' : ''}" onclick="toggleModule(this)" style="border-left:3px solid ${m.color}">
      <div class="module-dot" style="background:${m.color}"></div>
      <span class="module-title">Module ${m.id}: ${m.title}</span>
      <span class="module-chevron">▶</span>
    </div>
    <div class="lesson-list">`;
    m.lessons.forEach(l => {
      const isDone = done[l.id];
      const isActive = currentLesson === l.id;
      html += `<div class="lesson-item ${isDone ? 'done' : ''} ${isActive ? 'active' : ''}" onclick="loadLesson('${l.id}')">${l.title}</div>`;
    });
    html += '</div>';
  });
  document.getElementById('sidebar').innerHTML = html;
}

function toggleModule(el) {
  el.classList.toggle('open');
}

function loadLesson(id) {
  currentLesson = id;
  buildSidebar();
  const idx = allLessons.findIndex(l => l.id === id);
  const lesson = allLessons[idx];
  const module = MODULES.find(m => m.id === lesson.moduleId);
  const content = LESSON_CONTENT[id];
  const prevLesson = idx > 0 ? allLessons[idx - 1] : null;
  const nextLesson = idx < allLessons.length - 1 ? allLessons[idx + 1] : null;
  let nav = '<div class="lesson-nav">';
  if (prevLesson) {
    nav += `<button class="lesson-nav button btn-prev" onclick="loadLesson('${prevLesson.id}')">← Previous</button>`;
  } else {
    nav += '<span></span>';
  }
  if (nextLesson) {
    nav += `<button class="lesson-nav button btn-next" onclick="markAndNext('${id}', '${nextLesson.id}')">Next →</button>`;
  } else {
    nav += `<button class="lesson-nav button btn-complete" onclick="markLessonDone('${id}'); buildSidebar(); showView('progress')">Complete Module ✓</button>`;
  }
  nav += '</div>';
  document.getElementById('content').innerHTML = `<div class="lesson-page">${content}${nav}</div>`;
  document.getElementById('content').scrollTop = 0;
}

function markAndNext(currentId, nextId) {
  markLessonDone(currentId);
  loadLesson(nextId);
}

function showWelcome() {

  MODULES.forEach(m => {

      <h3>${m.title}</h3>

/* ====================================================
   QUIZ VIEW
==================================================== */
function startQuiz(moduleFilter) {
  quizState.mode = moduleFilter || 'all';
  quizState.filteredQ = moduleFilter === 'all'
    ? [...QUIZ]
    : QUIZ.filter(q => q.m === parseInt(moduleFilter));
  // Shuffle
  for (let i = quizState.filteredQ.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [quizState.filteredQ[i], quizState.filteredQ[j]] = [quizState.filteredQ[j], quizState.filteredQ[i]];
  }
  quizState.currentQ = 0;
  quizState.answers = {};
  quizState.answered = {};
  quizState.submitted = false;
  quizState.showResults = false;
  renderQuiz();
}

function renderQuiz() {
  const qv = document.getElementById('quiz-view');
  if (quizState.showResults) {
    renderResults();
    return;
  }
  if (!quizState.filteredQ.length) {
    // Show quiz start screen
    let html = `<div style="max-width:820px;margin:0 auto">
      <h2 style="color:var(--navy);margin-bottom:8px">Certification Quiz — 100 Questions</h2>
      <p style="color:var(--text-muted);margin-bottom:24px">Test your knowledge at Qlik certification level. Choose all questions or a specific module.</p>
      <div style="display:flex;flex-wrap:wrap;gap:12px;margin-bottom:32px">
        <button class="quiz-btn" style="background:var(--green);color:#fff" onclick="startQuiz('all')">All 100 Questions</button>`;
    MODULES.forEach(m => {
      html += `<button class="quiz-btn" style="background:${m.color};color:#fff" onclick="startQuiz('${m.id}')">Module ${m.id} Only</button>`;
    });
    html += '</div>';
    const p = loadProgress();
    if (p.bestScore) {
      const pct = Math.round(p.bestScore.score / p.bestScore.total * 100);
      html += `<div class="info-box"><strong>Your best score:</strong> ${p.bestScore.score}/${p.bestScore.total} (${pct}%)</div>`;
    }
    html += '</div>';
    qv.innerHTML = html;
    return;
  }
  const q = quizState.filteredQ[quizState.currentQ];
  const total = quizState.filteredQ.length;
  const answered = Object.keys(quizState.answered).length;
  const pct = Math.round(answered / total * 100);
  const modColor = MODULE_COLORS[q.m - 1];
  const modName = MODULES.find(m => m.id === q.m).title;
  const isAnswered = quizState.answered[quizState.currentQ] !== undefined;
  const selectedAns = quizState.answers[quizState.currentQ];
  let html = `
    <div class="quiz-filter">
      <button class="filter-btn ${quizState.mode === 'all' ? 'active' : ''}" onclick="startQuiz('all')">All</button>`;
  MODULES.forEach(m => {
    html += `<button class="filter-btn ${quizState.mode == m.id ? 'active' : ''}" onclick="startQuiz('${m.id}')">M${m.id}</button>`;
  });
  html += `</div>
    <div class="quiz-header">
      <h2>Question ${quizState.currentQ + 1} of ${total}</h2>
      <div class="quiz-stats">
        <span><strong>${answered}</strong> answered</span>
        <span><strong>${Math.round(Object.values(quizState.answered).filter(v => v === true).length / Math.max(answered, 1) * 100)}%</strong> correct</span>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="question-card">
      <div class="question-meta">
        <span class="question-num">Q${q.id}</span>
        <span class="module-tag" style="background:${modColor}22;color:${modColor}">Module ${q.m}: ${modName}</span>
      </div>
      <div class="question-text">${q.q}</div>
      <div class="options">`;
  q.opts.forEach((opt, i) => {
    let cls = '';
    if (isAnswered) {
      if (i === q.ans) cls = 'correct';
      else if (i === selectedAns && selectedAns !== q.ans) cls = 'wrong';
    } else if (i === selectedAns) {
      cls = 'selected';
    }
    const letters = ['A','B','C','D'];
    html += `<button class="option-btn ${cls}" ${isAnswered ? 'disabled' : ''} onclick="selectAnswer(${i})">
      <span class="option-letter">${letters[i]}.</span>
      <span>${opt}</span>
    </button>`;
  });
  html += '</div>';
  if (isAnswered) {
    const correct = selectedAns === q.ans;
    html += `<div class="explanation-box ${correct ? '' : 'wrong-exp'}" style="display:block">
      ${correct ? '✓ Correct!' : `✗ Incorrect. The correct answer is: <strong>${q.opts[q.ans]}</strong>`}
    </div>`;
  }
  html += `</div>
    <div class="quiz-controls">
      <button class="quiz-btn" id="btn-prev-q" onclick="prevQuestion()" ${quizState.currentQ === 0 ? 'disabled style="opacity:.4"' : ''}>← Previous</button>
      <button class="quiz-btn" id="btn-submit" ${isAnswered ? 'disabled style="display:none"' : ''} onclick="submitAnswer()" ${selectedAns === undefined && !isAnswered ? 'disabled style="opacity:.4"' : ''}>Submit Answer</button>
      <button class="quiz-btn" id="btn-next-q" style="${isAnswered ? 'display:inline-block' : 'display:none'};background:var(--green);color:#fff" onclick="nextQuestion()">${quizState.currentQ < total - 1 ? 'Next →' : 'Finish Quiz'}</button>
    </div>`;
  qv.innerHTML = html;
}

function selectAnswer(idx) {
  if (quizState.answered[quizState.currentQ] !== undefined) return;
  quizState.answers[quizState.currentQ] = idx;
  renderQuiz();
}

function submitAnswer() {
  const q = quizState.filteredQ[quizState.currentQ];
  const selected = quizState.answers[quizState.currentQ];
  if (selected === undefined) return;
  quizState.answered[quizState.currentQ] = (selected === q.ans);
  renderQuiz();
}

function nextQuestion() {
  const total = quizState.filteredQ.length;
  if (quizState.currentQ < total - 1) {
    quizState.currentQ++;
    renderQuiz();
  } else {
    finishQuiz();
  }
}

function prevQuestion() {
  if (quizState.currentQ > 0) {
    quizState.currentQ--;
    renderQuiz();
  }
}

function finishQuiz() {
  const total = quizState.filteredQ.length;
  let score = 0;
  const perModule = {};
  MODULES.forEach(m => { perModule[m.id] = { score: 0, total: 0 }; });
  quizState.filteredQ.forEach((q, i) => {
    const correct = quizState.answered[i] === true;
    if (correct) score++;
    perModule[q.m].total++;
    if (correct) perModule[q.m].score++;
  });
  saveBestScore(score, total, perModule);
  quizState.finalScore = score;
  quizState.finalTotal = total;
  quizState.finalPerModule = perModule;
  quizState.showResults = true;
  renderResults();
}

function renderResults() {
  const qv = document.getElementById('quiz-view');
  const { finalScore: score, finalTotal: total, finalPerModule: perModule } = quizState;
  const pct = Math.round(score / total * 100);
  const pass = pct >= 70;
  let html = `<div id="results-view" style="display:block">
    <div class="results-hero">
      <div class="score-label">Your Score</div>
      <div class="big-score">${pct}%</div>
      <div>${score} / ${total} correct</div>
      <div class="verdict">${pass ? '🎯 PASS — Certification Ready!' : '📚 Keep Studying — Aim for 70%+'}</div>
    </div>
    <div class="module-results">`;
  MODULES.forEach(m => {
    const ms = perModule[m.id];
    if (!ms || ms.total === 0) return;
    const mpct = Math.round(ms.score / ms.total * 100);
    html += `<div class="module-result-card">
      <h4>Module ${m.id}: ${m.title}</h4>
      <div class="mod-score">${mpct}% <small style="font-size:.9rem;font-weight:400">(${ms.score}/${ms.total})</small></div>
      <div class="mod-bar"><div class="mod-fill" style="width:${mpct}%;background:${m.color}"></div></div>
    </div>`;
  });
  html += `</div>
    <div class="results-actions">
      <button class="results-actions button btn-restart" onclick="startQuiz(quizState.mode)" style="background:var(--green);color:#fff;padding:11px 26px;border-radius:7px;border:none;cursor:pointer;font-weight:600;font-size:.9rem">Try Again</button>
      <button onclick="quizState.showResults=false;quizState.currentQ=0;quizState.answers={};quizState.answered={};renderQuiz()" style="background:transparent;color:var(--navy);border:1px solid var(--border);padding:11px 26px;border-radius:7px;cursor:pointer;font-weight:600;font-size:.9rem">Review Questions</button>
      <button onclick="showView('study')" style="background:var(--navy);color:#fff;padding:11px 26px;border-radius:7px;border:none;cursor:pointer;font-weight:600;font-size:.9rem">Back to Study</button>
    </div>
  </div>`;
  qv.innerHTML = html;
}

/* ====================================================
   SEARCH
==================================================== */
let searchTimer = null;

function handleSearch(val) {
  clearTimeout(searchTimer);
  if (!val.trim()) {
    // If input cleared, go back to previous non-search view
    if (currentView === 'search') showView('study');
    return;
  }
  searchTimer = setTimeout(() => {
    showView('search');
    performSearch(val.trim());
  }, 180);
}

function stripHtml(html) {
  return html.replace(/<[^>]+>/g, ' ').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/\s+/g,' ').trim();
}

function getExcerpt(text, term, ctxLen = 80) {
  const idx = text.toLowerCase().indexOf(term.toLowerCase());
  if (idx === -1) return text.slice(0, 160) + '…';
  const start = Math.max(0, idx - ctxLen);
  const end = Math.min(text.length, idx + term.length + ctxLen);
  let excerpt = (start > 0 ? '…' : '') + text.slice(start, end) + (end < text.length ? '…' : '');
  return excerpt;
}

function highlightTerms(text, terms) {
  let out = text;
  terms.forEach(t => {
    const re = new RegExp(`(${t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
    out = out.replace(re, '<mark>$1</mark>');
  });
  return out;
}

function performSearch(query) {
  const terms = query.toLowerCase().split(/\s+/).filter(Boolean);
  const results = [];

  MODULES.forEach(m => {
    m.lessons.forEach(l => {
      const raw = LESSON_CONTENT[l.id] || '';
      const text = stripHtml(raw);
      const textLow = text.toLowerCase();
      const matchCount = terms.reduce((acc, t) => {
        let count = 0, pos = 0;
        while ((pos = textLow.indexOf(t, pos)) !== -1) { count++; pos++; }
        return acc + count;
      }, 0);
      if (matchCount > 0) {
        const bestTerm = terms.reduce((best, t) => textLow.includes(t) ? (best || t) : best, null) || terms[0];
        const rawExcerpt = getExcerpt(text, bestTerm);
        results.push({ lessonId: l.id, lessonTitle: l.title, moduleId: m.id, moduleTitle: m.title, moduleColor: m.color, matchCount, excerpt: highlightTerms(rawExcerpt, terms) });
      }
    });
  });

  results.sort((a, b) => b.matchCount - a.matchCount);
  renderSearchResults(results, query);
}

function renderSearchResults(results, query) {
  const sv = document.getElementById('search-view');
  if (!results.length) {
    sv.innerHTML = `<div class="search-results-page"><h2>Search</h2><div class="search-no-results"><div class="no-icon">🔍</div><p>No results for "<strong>${query}</strong>"</p><p style="font-size:.85rem;margin-top:6px">Try different keywords</p></div></div>`;
    return;
  }
  let html = `<div class="search-results-page">
    <h2>Search results</h2>
    <p class="search-meta">${results.length} lesson${results.length > 1 ? 's' : ''} found for "<strong>${query}</strong>"</p>`;
  results.forEach(r => {
    html += `<div class="search-result-card" onclick="clearSearch();loadLesson('${r.lessonId}')">
      <div class="search-result-header">
        <span class="search-result-module" style="background:${r.moduleColor}">Module ${r.moduleId}</span>
        <span class="search-result-lesson">${r.lessonTitle}</span>
      </div>
      <div class="search-result-excerpt">${r.excerpt}</div>
    </div>`;
  });
  html += '</div>';
  sv.innerHTML = html;
}

function clearSearch() {
  document.getElementById('search-input').value = '';
  showView('study');
}

let podAudio = null;
let podPlaying = false;
let podCurrent = 0;

function togglePodcast() {
  const bar = document.getElementById('podcast-bar');
  if (bar.classList.contains('visible')) {
    closePodcast();
  } else {
    openPodcast(podCurrent);
  }
}

function openPodcast(idx) {
  podCurrent = idx;
  const p = PODCASTS[idx];
  const bar = document.getElementById('podcast-bar');
  document.getElementById('pod-title').textContent = p.title;
  document.getElementById('pod-sub').textContent = p.sub;
  if (!podAudio || podAudio.src !== p.file) {
    if (podAudio) { podAudio.pause(); }
    podAudio = new Audio(p.file);
    podAudio.addEventListener('timeupdate', updatePodProgress);
    podAudio.addEventListener('loadedmetadata', updatePodProgress);
    podAudio.addEventListener('ended', () => { podPlaying = false; updatePlayBtn(); });
  }
  bar.classList.add('visible');
  document.body.classList.add('pod-open');
  updatePlayBtn();
  updatePodProgress();
  updateTrackNav();
}

function closePodcast() {
  const bar = document.getElementById('podcast-bar');
  bar.classList.remove('visible');
  document.body.classList.remove('pod-open');
  if (podAudio && podPlaying) { podAudio.pause(); podPlaying = false; }
  updatePlayBtn();
}

function podPlayPause() {
  if (!podAudio) return;
  if (podPlaying) {
    podAudio.pause();
    podPlaying = false;
  } else {
    podAudio.play().catch(() => {});
    podPlaying = true;
  }
  updatePlayBtn();
}

function podSkip(sec) {
  if (!podAudio) return;
  podAudio.currentTime = Math.max(0, Math.min(podAudio.duration || 0, podAudio.currentTime + sec));
}

function updatePlayBtn() {
  const btn = document.getElementById('pod-play-btn');
  if (btn) btn.textContent = podPlaying ? '⏸' : '▶';
}

function updatePodProgress() {
  if (!podAudio) return;
  const cur = podAudio.currentTime || 0;
  const dur = podAudio.duration || 0;
  document.getElementById('pod-current').textContent = fmtTime(cur);
  document.getElementById('pod-duration').textContent = fmtTime(dur);
  const seek = document.getElementById('pod-seek');
  if (seek && dur > 0) seek.value = (cur / dur * 100).toFixed(1);
}

function podSeek(val) {
  if (!podAudio || !podAudio.duration) return;
  podAudio.currentTime = val / 100 * podAudio.duration;
}

function podSetSpeed(val) {
  if (podAudio) podAudio.playbackRate = parseFloat(val);
}

function podPrevTrack() {
  if (podCurrent > 0) openPodcast(podCurrent - 1);
}

function podNextTrack() {
  if (podCurrent < PODCASTS.length - 1) openPodcast(podCurrent + 1);
}

function updateTrackNav() {
  const num = document.getElementById('pod-track-num');
  const prev = document.getElementById('pod-prev-track');
  const next = document.getElementById('pod-next-track');
  if (num) num.textContent = `${podCurrent + 1} / ${PODCASTS.length}`;
  if (prev) prev.style.opacity = podCurrent === 0 ? '0.3' : '1';
  if (next) next.style.opacity = podCurrent === PODCASTS.length - 1 ? '0.3' : '1';
}

function fmtTime(s) {
  if (!s || isNaN(s)) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2,'0')}`;
}

/* ====================================================
   INIT
==================================================== */
buildSidebar();
showWelcome();
// Open first module in sidebar
document.querySelector('.module-header').classList.add('open');
</script>

<!-- Podcast sticky bar -->
<div id="podcast-bar">
  <div class="pod-info">
    <div class="pod-title" id="pod-title"></div>
    <div class="pod-sub" id="pod-sub"></div>
    <div class="pod-tracks">
      <button class="pod-track-btn" id="pod-prev-track" onclick="podPrevTrack()" title="Épisode précédent">‹</button>
      <span id="pod-track-num" style="font-size:.72rem;color:rgba(255,255,255,.5)">1 / 2</span>
      <button class="pod-track-btn" id="pod-next-track" onclick="podNextTrack()" title="Épisode suivant">›</button>
    </div>
  </div>
  <div class="pod-controls">
    <button class="pod-btn" onclick="podSkip(-15)" title="−15s">⏮ 15</button>
    <button class="pod-btn play-main" id="pod-play-btn" onclick="podPlayPause()">▶</button>
    <button class="pod-btn" onclick="podSkip(15)" title="+15s">15 ⏭</button>
  </div>
  <div class="pod-progress-wrap">
    <span class="pod-time" id="pod-current">0:00</span>
    <input type="range" class="pod-seek" id="pod-seek" min="0" max="100" value="0" step="0.1" oninput="podSeek(this.value)" />
    <span class="pod-time" id="pod-duration">0:00</span>
  </div>
  <select class="pod-speed" onchange="podSetSpeed(this.value)" title="Playback speed">
    <option value="0.75">0.75×</option>
    <option value="1" selected>1×</option>
    <option value="1.25">1.25×</option>
    <option value="1.5">1.5×</option>
    <option value="2">2×</option>
  </select>
  <button class="pod-close" onclick="closePodcast()" title="Close">✕</button>
</div>

</body>
</html>
